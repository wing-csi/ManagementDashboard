name: collect

on:
  schedule:
    - cron: '0 21 * * *' # 每日 05:00 HKT
  push:
    branches: [main]
    paths: ['config.toml', 'scripts/**', 'docs/**', '.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  collect-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          pip install pytest -q
          python3 -m pytest scripts/ -q

      - name: Collect metrics
        env:
          # 讀其他 private repo 需要 PAT;冇設定 secret 就 fallback 用
          # 預設 token(只夠讀 public repos 同本 repo)
          GH_METRICS_TOKEN: ${{ secrets.GH_METRICS_TOKEN || github.token }}
          # per-repo tokens(config token_env 對應):secrets 唔會自動變 env,
          # 每加一個 token 都要喺度加一行
          BEN_GH_METRICS_TOKEN: ${{ secrets.BEN_GH_METRICS_TOKEN }}
        run: python3 scripts/collect_github.py --config config.toml --out docs/data/metrics.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
