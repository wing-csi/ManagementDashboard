# ManagementDashboard 設定

# 統計範圍(日)
window_days = 180

# task 單位:
#   auto    = merged PRs + 冇 associated PR 嘅 commits(唔會重複計)
#   pr      = 只計 merged PRs
#   commits = 只計 branch 上嘅 non-merge commits
mode = "auto"

# ---- 要追蹤嘅 repos(逐個加)----

[[repos]]
name = "wing-csi/AIFlowTesting"
# branch = "main"          # 唔填就自動用 default branch(只影響 commits)

[[repos]]
name = "Tony-Liu-1248/abci-crm"

# [[repos]]
# name = "wing-csi/another-repo"

# ---- 分級規則(priority:label → trailer → author → rules)----

[classify]
label_prefix = "ai-level/"   # PR label,例:ai-level/L3
trailer_key = "AI-Level"     # commit message / PR body 嘅 trailer,例:AI-Level: L3
exclude_authors = ["dependabot[bot]", "renovate[bot]", "github-actions[bot]"]

# 冇 label / trailer 時,用 PR 行為信號推斷 L2–L5:
# agent bot 開 PR?有冇 review 來回?AI / 人手 commits 比例?diff 有冇 test?auto-merge?
smart_inference = true

# 當係 coding agent 處理嘅 GitHub 帳號(*[bot] 會自動當 agent,呢度加人型帳號)
agent_authors = []

# SOP 證據路徑:diff 觸及呢啲 prefix = 行咗 plan → approval → tests-first 流程 → L3
# 有 AI 痕跡但冇 SOP artifact → L2(ad-hoc prompting,冇跟流程)
sop_paths = ["testcases/"]

# 完全冇任何 AI / SOP 痕跡時嘅預設 level
# "L1" = 假設日常有 inline assist;"" = 老實計「未分級」
no_evidence_level = "L1"

# agent bot 帳號直接對應 level(啱用於 auto-merge pipeline)
[classify.author_levels]
# "my-agent[bot]" = "L5"

# 冇 label / trailer 時嘅 fallback heuristics(由上至下 first match)
[[classify.rules]]
contains = "generated with [claude code]"
level = "L3"

[[classify.rules]]
contains = "co-authored-by: claude"
level = "L3"
